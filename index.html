<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invite</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🎵 Music -->
<audio id="bg-music" loop>
  <source src="pawan-singh.mp3" type="audio/mpeg">
</audio>


<div class="entry" id="entry">

  <!-- Doors -->
  <div class="door left"></div>
  <div class="door right"></div>

  <!-- Content -->
  <div class="entry-inner">
    <h1>You're Invited</h1>
    <button id="openBtn">Tap to Open</button>
  </div>

</div>

<!-- MAIN CONTENT -->
<div class="main" id="main">
  <div class="card">

    <h2>Anuj <span>&</span> Sonam</h2>

    <p class="line">Together with their families</p>

    <div class="divider"></div>

    <p class="date">25 August 2026</p>
    <p class="time">7:00 PM onwards</p>

    <div class="divider"></div>

    <p class="venue">Nala Paar, Gorakhpur, Uttar Pradesh</p>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
