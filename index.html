<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wedding Invite</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 🎵 Music -->
  <audio id="bg-music" loop>
    <source src="pawan-singh.mp3" type="audio/mpeg">
  </audio>

  <!-- 🎬 Entry Screen -->
  <div class="overlay" id="overlay">
    <div class="overlay-content">
      <h1>You're Invited</h1>
      <p>Tap to Enter</p>
    </div>
  </div>

  <!-- 🌟 Main Content -->
  <div class="content" id="content">

    <h2 class="names">Anuj ❤️ Sonam</h2>

    <p class="line">Together with their families</p>

    <div class="divider"></div>

    <p class="date">25 August 2026</p>
    <p class="time">7:00 PM onwards</p>

    <div class="divider"></div>

    <p class="venue">Nala Paar, Gorakhpur, Uttar Pradesh</p>

  </div>

  <script src="script.js"></script>
</body>
</html>
